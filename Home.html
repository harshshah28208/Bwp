<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home - Student Registration Form</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f4f6f9;
      color: #333;
    }

    /* HEADER & NAVIGATION */
    header {
      background-color: #1e293b;
      color: #ffffff;
      padding: 15px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header h2 {
      margin: 0;
      font-size: 20px;
    }

    nav a {
      color: #ffffff;
      text-decoration: none;
      margin-left: 20px;
      font-weight: bold;
      font-size: 15px;
    }

    nav a:hover, nav a.active {
      color: #38bdf8;
    }

    /* FORM CONTAINER */
    .container {
      max-width: 800px;
      margin: 30px auto;
      background-color: #ffffff;
      padding: 30px 40px;
      border-radius: 8px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
      border: 1px solid #ddd;
    }

    .form-title {
      margin-top: 0;
      font-size: 22px;
      color: #1e293b;
      border-bottom: 2px solid #38bdf8;
      padding-bottom: 8px;
    }

    .form-row {
      margin-bottom: 15px;
    }

    label {
      display: block;
      font-weight: bold;
      margin-bottom: 5px;
      font-size: 14px;
    }

    input[type="text"],
    input[type="email"],
    input[type="tel"],
    select,
    textarea {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid #ccc;
      border-radius: 4px;
      box-sizing: border-box;
      font-size: 14px;
    }

    input[type="text"]:focus,
    input[type="email"]:focus,
    input[type="tel"]:focus,
    select:focus,
    textarea:focus {
      outline: none;
      border-color: #2563eb;
    }

    .radio-group, .checkbox-group {
      display: flex;
      gap: 15px;
      margin-top: 5px;
    }

    .radio-group label, .checkbox-group label {
      font-weight: normal;
      cursor: pointer;
    }

    .btn-group {
      margin-top: 25px;
    }

    button {
      padding: 10px 20px;
      font-size: 15px;
      font-weight: bold;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      margin-right: 10px;
    }

    .btn-submit {
      background-color: #2563eb;
      color: #ffffff;
    }

    .btn-submit:hover {
      background-color: #1d4ed8;
    }

    .btn-reset {
      background-color: #e2e8f0;
      color: #333;
    }

    .btn-reset:hover {
      background-color: #cbd5e1;
    }
  </style>
</head>
<body>

  <!-- HEADER STRUCTURE -->
  <header>
    <h2>Student Portal</h2>
    <nav>
      <a href="Home.html" class="active">Home</a>
      <a href="AboutMe.html">About Me</a>
      <a href="ContactUs.html">Contact us</a>
      <a href="MSUHome.html">MSU Home</a>
    </nav>
  </header>

  <!-- FORM CONTAINER -->
  <div class="container">
    <h2 class="form-title">Student Registration Form</h2>

    <form action="#" method="POST" onsubmit="event.preventDefault(); alert('Registration form submitted!');">
      
      <!-- First Name -->
      <div class="form-row">
        <label for="firstName">First Name:</label>
        <input type="text" id="firstName" name="firstName" placeholder="Enter first name" required>
      </div>

      <!-- Middle Name -->
      <div class="form-row">
        <label for="middleName">Middle Name:</label>
        <input type="text" id="middleName" name="middleName" placeholder="Enter middle name">
      </div>

      <!-- Last Name -->
      <div class="form-row">
        <label for="lastName">Last Name:</label>
        <input type="text" id="lastName" name="lastName" placeholder="Enter last name" required>
      </div>

      <!-- Gender (Radio Button) -->
      <div class="form-row">
        <label>Gender:</label>
        <div class="radio-group">
          <label><input type="radio" name="gender" value="Male" checked> Male</label>
          <label><input type="radio" name="gender" value="Female"> Female</label>
          <label><input type="radio" name="gender" value="Other"> Other</label>
        </div>
      </div>

      <!-- Address (Textarea) -->
      <div class="form-row">
        <label for="address">Address:</label>
        <textarea id="address" name="address" rows="4" placeholder="Enter full address" required></textarea>
      </div>

      <!-- Phone No. -->
      <div class="form-row">
        <label for="phone">Phone No.:</label>
        <input type="tel" id="phone" name="phone" placeholder="Enter phone number" required>
      </div>

      <!-- Email ID -->
      <div class="form-row">
        <label for="email">Email ID:</label>
        <input type="email" id="email" name="email" placeholder="Enter email address" required>
      </div>

      <!-- Hobbies (Checkbox) -->
      <div class="form-row">
        <label>Hobbies:</label>
        <div class="checkbox-group">
          <label><input type="checkbox" name="hobbies" value="Reading"> Reading</label>
          <label><input type="checkbox" name="hobbies" value="Coding" checked> Coding</label>
          <label><input type="checkbox" name="hobbies" value="Sports"> Sports</label>
          <label><input type="checkbox" name="hobbies" value="Music"> Music</label>
        </div>
      </div>

      <!-- City Dropdown -->
      <div class="form-row">
        <label for="city">City:</label>
        <select id="city" name="city" required>
          <option value="" disabled selected>-- Select City --</option>
          <option value="Vadodara">Vadodara</option>
          <option value="Ahmedabad">Ahmedabad</option>
          <option value="Surat">Surat</option>
          <option value="Mumbai">Mumbai</option>
        </select>
      </div>

      <!-- State Dropdown -->
      <div class="form-row">
        <label for="state">State:</label>
        <select id="state" name="state" required>
          <option value="" disabled selected>-- Select State --</option>
          <option value="Gujarat">Gujarat</option>
          <option value="Maharashtra">Maharashtra</option>
          <option value="Delhi">Delhi</option>
        </select>
      </div>

      <!-- Country Dropdown -->
      <div class="form-row">
        <label for="country">Country:</label>
        <select id="country" name="country" required>
          <option value="" disabled selected>-- Select Country --</option>
          <option value="India">India</option>
          <option value="USA">USA</option>
          <option value="UK">UK</option>
        </select>
      </div>

      <!-- College Name Dropdown Menu -->
      <div class="form-row">
        <label for="collegeName">College Name (Dropdown Menu):</label>
        <select id="collegeName" name="collegeName" required>
          <option value="" disabled selected>-- Select College Name --</option>
          <option value="Faculty of Technology and Engineering - MSU">Faculty of Technology and Engineering - MSU</option>
          <option value="Faculty of Science - MSU">Faculty of Science - MSU</option>
          <option value="Faculty of Commerce - MSU">Faculty of Commerce - MSU</option>
          <option value="Faculty of Fine Arts - MSU">Faculty of Fine Arts - MSU</option>
        </select>
      </div>

      <!-- Form Action Buttons -->
      <div class="btn-group">
        <button type="submit" class="btn-submit">Register</button>
        <button type="reset" class="btn-reset">Reset</button>
      </div>

    </form>
  </div>

</body>
</html>
