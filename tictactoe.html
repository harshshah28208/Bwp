<!DOCTYPE html>
<html>
<head>
    <title>Tic Tac Toe</title>
    <style>
        body{
            text-align:center;
            font-family:Arial;
        }
        #board{
            width:180px;
            margin:auto;
            display:grid;
            grid-template-columns:repeat(3,60px);
        }
        .cell{
            width:60px;
            height:60px;
            border:1px solid black;
            font-size:30px;
            line-height:60px;
            cursor:pointer;
        }
        button{
            margin-top:15px;
            padding:8px 15px;
        }
    </style>
</head>
<body>

<h2>Tic Tac Toe</h2>

<div id="board">
    <div class="cell" onclick="play(this,0)"></div>
    <div class="cell" onclick="play(this,1)"></div>
    <div class="cell" onclick="play(this,2)"></div>
    <div class="cell" onclick="play(this,3)"></div>
    <div class="cell" onclick="play(this,4)"></div>
    <div class="cell" onclick="play(this,5)"></div>
    <div class="cell" onclick="play(this,6)"></div>
    <div class="cell" onclick="play(this,7)"></div>
    <div class="cell" onclick="play(this,8)"></div>
</div>

<h3 id="msg"></h3>

<button onclick="restart()">Restart</button>

<script>
let board=["","","","","","","","",""];
let player="X";

function play(cell,index){
    if(board[index]=="" ){
        board[index]=player;
        cell.innerHTML=player;

        if(check()){
            document.getElementById("msg").innerHTML=player+" Wins!";
            return;
        }

        if(!board.includes("")){
            document.getElementById("msg").innerHTML="Draw!";
            return;
        }

        player=(player=="X")?"O":"X";
    }
}

function check(){
    let win=[
        [0,1,2],[3,4,5],[6,7,8],
        [0,3,6],[1,4,7],[2,5,8],
        [0,4,8],[2,4,6]
    ];

    for(let i=0;i<win.length;i++){
        let a=win[i][0];
        let b=win[i][1];
        let c=win[i][2];

        if(board[a]!="" && board[a]==board[b] && board[b]==board[c])
            return true;
    }
    return false;
}

function restart(){
    board=["","","","","","","","",""];
    player="X";
    document.getElementById("msg").innerHTML="";
    let cells=document.getElementsByClassName("cell");
    for(let i=0;i<cells.length;i++)
        cells[i].innerHTML="";
}
</script>

</body>
</html>
