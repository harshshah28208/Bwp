<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lab 1 - Side Menu</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 30px;
      background-color: #f4f4f4;
    }

    .side-menu {
      width: 260px;
      background-color: #ffffff;
      border: 1px solid #ddd;
      border-radius: 4px;
      padding: 15px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .menu-heading {
      font-size: 16px;
      font-weight: bold;
      color: #111;
      margin-bottom: 10px;
      margin-top: 15px;
    }

    .menu-heading:first-child {
      margin-top: 0;
    }

    .menu-list {
      list-style-type: disc;
      padding-left: 20px;
      margin: 0;
    }

    .menu-list li {
      margin-bottom: 8px;
    }

    .menu-list li a {
      text-decoration: none;
      color: #0066c0;
      font-size: 14px;
    }

    .menu-list li a:hover {
      color: #c45500;
      text-decoration: underline;
    }

    .price-list {
      list-style-type: none;
      padding-left: 0;
      margin: 0;
    }

    .price-list li {
      margin-bottom: 8px;
    }

    .price-list li a {
      text-decoration: none;
      color: #111;
      font-size: 14px;
    }

    .price-list li a:hover {
      color: #c45500;
    }
  </style>
</head>
<body>

  <div class="side-menu">
    <div class="menu-heading">Computers &amp; Accessories</div>
    <ul class="menu-list">
      <li><a href="#">Accessories &amp; Peripherals</a></li>
      <li><a href="#">Components</a></li>
      <li><a href="#">Desktops</a></li>
      <li><a href="#">External Devices &amp; Data Storage</a></li>
      <li><a href="#">Laptops</a></li>
    </ul>

    <div class="menu-heading">Price</div>
    <ul class="price-list">
      <li><a href="#">Under ₹1,000</a></li>
      <li><a href="#">₹1,000 - ₹5,000</a></li>
      <li><a href="#">₹5,000 - ₹10,000</a></li>
      <li><a href="#">₹10,000 - ₹20,000</a></li>
      <li><a href="#">Over ₹20,000</a></li>
    </ul>
  </div>

</body>
</html>
